services:
  - type: web
    name: paperclip-saas-v1
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    numInstances: 1
    autoDeploy: false
    healthCheckPath: /api/health
    disk:
      name: paperclip-saas-v1-data
      mountPath: /paperclip
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: SERVE_UI
        value: "true"
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_INSTANCE_ID
        value: render-prod
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_PUBLIC_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-saas-v1-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: PAPERCLIP_SECRETS_MASTER_KEY
        generateValue: true
      - key: PAPERCLIP_SECRETS_STRICT_MODE
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: paperclip-saas-v1-db
    databaseName: paperclip
    user: paperclip
    plan: basic-256mb
    diskSizeGB: 5
    postgresMajorVersion: "17"
    ipAllowList: []

previews:
  generation: off
